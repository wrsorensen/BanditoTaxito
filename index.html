<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bandito Taxito</title>
  <meta http-equiv="refresh" content="1.5; url=https://script.google.com/macros/s/AKfycbyM4acSDZT7L6q_I7UQDfMc4xZiCFGXlw9B9pPPawGQSQtTCvtQZFNxbsAQ3z7vFBcPVQ/exec">
  <style>
    :root {
      --midnight: #11100d;
      --parchment: #f4ead8;
      --card: #fff8ea;
      --ink: #2b241c;
      --red: #8f1f1b;
      --teal: #123f3d;
      --gold: #c59a45;
      --brown: #4a2f1b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      background:
        radial-gradient(circle at top left, rgba(197, 154, 69, 0.22), transparent 34%),
        radial-gradient(circle at bottom right, rgba(143, 31, 27, 0.24), transparent 32%),
        linear-gradient(155deg, #11100d 0%, #1f1711 48%, #123f3d 100%);
      color: var(--parchment);
      font-family: Arial, Helvetica, sans-serif;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background:
        linear-gradient(180deg, rgba(255, 248, 234, 0.96), rgba(244, 234, 216, 0.96));
      border: 2px solid rgba(197, 154, 69, 0.72);
      border-radius: 26px;
      padding: 24px 18px;
      color: var(--ink);
      text-align: center;
      box-shadow: 0 22px 50px rgba(0, 0, 0, 0.38);
    }

    .stamp {
      display: inline-block;
      padding: 7px 11px;
      border-radius: 999px;
      background: #1f1711;
      color: var(--parchment);
      border: 1px solid var(--gold);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    p {
      margin: 12px 0 0;
      font-size: 16px;
      line-height: 1.45;
      color: #6d5842;
      font-weight: 700;
    }

    .btn {
      display: block;
      width: 100%;
      min-height: 52px;
      margin-top: 18px;
      border-radius: 999px;
      background: linear-gradient(180deg, #b85624, #8f1f1b);
      color: white;
      text-decoration: none;
      font-size: 16px;
      font-weight: 900;
      line-height: 52px;
      border: 1px solid #6f1714;
      box-shadow: 0 8px 18px rgba(143, 31, 27, 0.28);
    }

    .small {
      margin-top: 12px;
      font-size: 12px;
      color: #7a6a58;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="stamp">Live App Launcher</div>
    <h1>Bandito Taxito</h1>
    <p>Opening the live Google Apps Script app...</p>
    <a class="btn" href="https://script.google.com/macros/s/AKfycbyM4acSDZT7L6q_I7UQDfMc4xZiCFGXlw9B9pPPawGQSQtTCvtQZFNxbsAQ3z7vFBcPVQ/exec">Open Bandito Taxito</a>
    <div class="small">GitHub Pages is the public launcher. GAS is the working app.</div>
  </main>

  <script>
    window.setTimeout(function() {
      window.location.replace("https://script.google.com/macros/s/AKfycbyM4acSDZT7L6q_I7UQDfMc4xZiCFGXlw9B9pPPawGQSQtTCvtQZFNxbsAQ3z7vFBcPVQ/exec");
    }, 1500);
  </script>
</body>
</html>
